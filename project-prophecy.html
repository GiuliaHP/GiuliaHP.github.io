<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prophecy — Projet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/icons/IC_Prophecy.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="project-cursor-icon" id="projectCursorIcon" aria-hidden="true">
    <img id="projectCursorIconImg" alt="" />
    <span id="projectCursorIconLabel"></span>
  </div>

  <div id="nav-placeholder"></div>

  <section class="project-trailer-banner" aria-label="Trailer Prophecy" style="--project-banner-bg: url('assets/img/backgrounds/BG_Prophecy.webp');">
    <div class="wrap">
      <div class="project-trailer-frame">
        <video class="project-trailer-video" muted loop playsinline preload="none" poster="assets/img/backgrounds/BG_Prophecy.webp">
          <source src="assets/img/trailers/TR_Prophecy.webm" type="video/webm" />
          <source src="assets/img/trailers/TR_Prophecy.mp4?v=20260320" type="video/mp4" />
        </video>
      </div>
    </div>
  </section>

  <section id="hero" class="project-page-hero">
    <div class="wrap">
      <div class="hero-left">
        <h1 class="hero-title"><em>Prophecy</em></h1>
        <div class="hero-bottom">
          <p class="hero-desc">
            Prophecy est une démo technique mêlant Visual novel et platformer en pixel art.
          </p>
        </div>
      </div>
      <a href="#prophecy-webgl" class="project-icon-link" title="Jouer à Prophecy">
        <img src="assets/img/icons/IC_Prophecy.png" alt="" class="project-icon" loading="lazy" />
      </a>
    </div>
  </section>

  <section class="project-webgl-section" id="prophecy-webgl">
    <div class="wrap">
      <div class="project-webgl-container">
        <iframe
          src="assets/games/WEBGL_Prophecy/index.html"
          class="project-webgl-frame"
          title="Jouer à Prophecy"
          allowfullscreen
          allow="autoplay"
        ></iframe>
      </div>
    </div>
  </section>

  <section class="showcase-section">
    <div class="wrap">
      <div class="showcase-gallery-mount" data-manifest="assets/data/prophecy.json" data-tall-image-threshold="0.6"></div>
    </div>
  </section>

  <section class="wrap" style="padding: 3rem 0;">
    <a href="index.html#projects" class="project-back-link">← Retour aux projets</a>
  </section>

  <div id="footer-placeholder"></div>

  <script defer src="assets/js/components.js"></script>
  <script defer src="assets/js/script.js"></script>
</body>
</html>
