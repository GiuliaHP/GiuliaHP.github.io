<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeux WebGL — Game Developer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #080e21;
      color: #e8eaed;
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    nav {
      background: #0f1429;
      border-bottom: 1px solid #1a2147;
      padding: 1rem 2rem;
      position: relative;
      z-index: 100;
    }
    
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .nav-logo {
      font-size: 1.2rem;
      font-weight: 600;
      color: #809eff;
      text-decoration: none;
    }
    
    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }
    
    .nav-links a {
      color: #e8eaed;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .nav-links a:hover {
      color: #809eff;
    }
    
    section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      position: relative;
      z-index: 10;
    }
    
    .hero-label {
      color: #809eff;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    
    h1 em {
      color: #809eff;
      font-style: normal;
    }
    
    .hero-desc {
      font-size: 1.1rem;
      color: #b0b4c4;
      max-width: 600px;
    }
    
    .section-label {
      color: #809eff;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    
    #games-gallery {
      position: relative;
      width: 100%;
      height: 600px;
      margin-top: 2rem;
      margin-bottom: 2rem;
    }
    
    .game-bubble {
      position: absolute;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.2s ease, transform 0.1s ease;
      filter: drop-shadow(0 0 10px rgba(128, 158, 255, 0.2));
    }
    
    .game-bubble:hover {
      filter: drop-shadow(0 0 20px rgba(128, 158, 255, 0.6));
      transform: scale(1.1);
    }
    
    .game-bubble img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    
    .game-bubble.clicked {
      filter: drop-shadow(0 0 30px rgba(128, 158, 255, 1));
    }
    
    .game-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(8, 11, 24, 0.95);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .game-modal.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    .game-modal-content {
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      background: #0f1429;
      border: 2px solid #809eff;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(128, 158, 255, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .game-modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid #1a2147;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .game-modal-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #e8eaed;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .game-modal-title img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }
    
    .game-modal-close {
      background: none;
      border: none;
      color: #8a8d99;
      cursor: pointer;
      font-size: 1.5rem;
      transition: color 0.2s;
    }
    
    .game-modal-close:hover {
      color: #e8eaed;
    }
    
    .game-modal-body {
      padding: 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .game-modal-desc {
      color: #b0b4c4;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .game-modal-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .game-action-button {
      background: #809eff;
      color: #080e21;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .game-action-button:hover {
      background: #a0b4ff;
      transform: scale(1.05);
    }

    .game-action-button.secondary {
      background: transparent;
      border: 1px solid #809eff;
      color: #809eff;
    }

    .game-action-button.secondary:hover {
      background: rgba(128, 158, 255, 0.1);
    }

    .game-webgl-frame {
      width: 100%;
      height: 500px;
      border: 1px solid #1a2147;
      border-radius: 6px;
      display: none;
    }

    .game-webgl-frame.active {
      display: block;
    }

    .game-loading {
      text-align: center;
      color: #8a8d99;
      display: none;
    }

    .game-loading.active {
      display: block;
    }
    
    .game-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(128, 158, 255, 0.2);
      border-top-color: #809eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 1rem auto;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    footer {
      background: #0f1429;
      border-top: 1px solid #1a2147;
      padding: 2rem;
      text-align: center;
      color: #8a8d99;
      font-size: 0.9rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      position: relative;
      z-index: 10;
    }
    
    .project-back-link {
      color: #809eff;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .project-back-link:hover {
      color: #a0b4ff;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="../">Giulia HP.</a>
      <ul class="nav-links">
        <li><a href="../">Accueil</a></li>
        <li><a href="games.html">Jeux</a></li>
      </ul>
    </div>
  </nav>

  <section>
    <p class="hero-label">Essai</p>
    <h1>Jeux <em>WebGL</em></h1>
    <p class="hero-desc">Essaie mes jeux développés en WebGL. Des petites expériences interactives directement dans le navigateur.</p>
  </section>

  <section>
    <div class="section-label">Sélectionne un jeu</div>
    <div id="games-gallery"></div>
  </section>

  <section style="padding: 1rem 2rem;">
    <a href="../" class="project-back-link">← Retour à l'accueil</a>
  </section>

  <footer>
    <span>© 2026 Giulia HP.</span>
    <span>Hébergé sur GitHub Pages</span>
  </footer>

  <div class="game-modal" id="gameModal">
    <div class="game-modal-content">
      <div class="game-modal-header">
        <h2 class="game-modal-title" id="gameModalTitle"></h2>
        <button class="game-modal-close" id="gameModalClose">✕</button>
      </div>
      <div class="game-modal-body" id="gameModalBody">
        <p class="game-modal-desc" id="gameModalDesc"></p>
        <div class="game-modal-actions" id="gameModalActions"></div>
        <div class="game-loading" id="gameLoading">
          <div class="game-loading-spinner"></div>
          <p>Chargement du jeu...</p>
        </div>
        <iframe class="game-webgl-frame" id="gameWebglFrame" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    const gamesData = [
      {
        id: "breakout",
        title: "Breakout for Candy",
        description: "Un jeu de casse-briques avec une touche sucrée. Casse les blocs et survie aux obstacles !",
        icon: "../img/icons/IC_Candy.png",
        webglPath: "WEBGL_BreakoutForCandy/BreakoutForCandyBUILD_WebGl/BreakoutForCandyBUILD_WebGl/index.html",
        type: "webgl"
      },
      {
        id: "dressup",
        title: "Dress Up Game Demo",
        description: "Crée ton personnage ! Habille-le avec différents vêtements et accessoires.",
        icon: "../img/icons/IC_Dressup.png",
        webglPath: "WEBGL_DressUpGame/Dress%20Up%20Game%20Demo%20%E2%80%94%20BUILD%20WEB/Dress%20Up%20Game%20Demo%20%E2%80%94%20BUILD%20WEB/index.html",
        type: "webgl"
      },
      {
        id: "prophecy",
        title: "Prophecy",
        description: "Une expérience mystique et poétique. Explore et découvre les secrets.",
        icon: "../img/icons/IC_Prophecy.png",
        webglPath: "WEBGL_Prophecy/WEBGL_Prophecy/index.html",
        type: "webgl"
      },
      {
        id: "sandbox",
        title: "Sandbox",
        description: "Un terrain de jeu libre. Expérimente et crée ton propre scénario.",
        icon: "../img/icons/IC_Solar.png",
        webglPath: "WEBGL_SolarSystem/WEBGL_SolarSystem/index.html",
        type: "webgl"
      },
      {
        id: "chara",
        title: "Chara",
        description: "Découvrez le monde de Chara. Un addon enrichissant pour votre expérience de jeu.",
        icon: "../img/icons/IC_Chara.png",
        downloadPath: "ADDON_Chara.zip",
        type: "addon"
      },
      {
        id: "herba",
        title: "The Herbarium",
        description: "Explorez une collection fascinante de plantes magiques et mystérieuses.",
        icon: "../img/icons/IC_Herbarium.png",
        itchioLink: "https://aconitum-napellus.itch.io/the-herbarium-demo",
        type: "itch"
      },
      {
        id: "ether",
        title: "Vallée d'Éther",
        description: "Plongez dans une vallée mystérieuse remplie de secrets à découvrir.",
        icon: "../img/icons/IC_Ether.png",
        itchioLink: "https://aconitum-napellus.itch.io/vallether",
        type: "itch"
      },
      {
        id: "slbv",
        title: "Sur la Bonne Voie",
        description: "Une aventure narrative passionnante qui teste vos choix et vos décisions.",
        icon: "../img/icons/IC_SLBV.png",
        itchioLink: "https://aconitum-napellus.itch.io/sur-la-bonne-voie",
        type: "itch"
      },
      {
        id: "tubp",
        title: "TUBP",
        description: "The Ultimate Battle Pavilion - Un combat intense et stratégique.",
        icon: "../img/icons/IC_TUBP.png",
        itchioLink: "https://aconitum-napellus.itch.io/the-unfinished-blueprint",
        type: "itch"
      }
    ];

    let mouseX = 0;
    let mouseY = 0;
    let bubbles = [];

    class GameBubble {
      constructor(game, index) {
        this.game = game;
        this.index = index;
        this.size = 100;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.angle = (index / gamesData.length) * Math.PI * 2;
        this.distance = 200 + Math.random() * 50;
        this.targetAngle = this.angle;
        this.targetDistance = this.distance;
        this.element = null;
      }

      update(containerWidth, containerHeight, mouseX, mouseY) {
        const centerX = containerWidth / 2;
        const centerY = containerHeight / 2;

        // Attraction vers la souris
        const dx = mouseX - centerX;
        const dy = mouseY - centerY;
        const distToMouse = Math.sqrt(dx * dx + dy * dy);
        
        if (distToMouse < 300) {
          // Si la souris est proche, les bulles la fuient
          this.targetDistance = 250;
          this.targetAngle = Math.atan2(dy, dx) + Math.PI;
        } else {
          // Sinon, elles reviennent à leur position
          this.targetDistance = 200 + Math.sin(Date.now() / 3000 + this.index) * 30;
          this.targetAngle = (this.index / gamesData.length) * Math.PI * 2 + Date.now() / 8000;
        }

        // Mouvement fluide
        this.angle += (this.targetAngle - this.angle) * 0.02;
        this.distance += (this.targetDistance - this.distance) * 0.02;

        const x = centerX + Math.cos(this.angle) * this.distance;
        const y = centerY + Math.sin(this.angle) * this.distance;

        if (this.element) {
          this.element.style.left = (x - this.size / 2) + 'px';
          this.element.style.top = (y - this.size / 2) + 'px';
          this.element.style.width = this.size + 'px';
          this.element.style.height = this.size + 'px';
        }
      }

      render(container) {
        if (!this.element) {
          this.element = document.createElement('div');
          this.element.className = 'game-bubble';
          this.element.innerHTML = `<img src="${this.game.icon}" alt="${this.game.title}">`;
          this.element.addEventListener('click', () => openGameModal(this.game));
          container.appendChild(this.element);
        }
      }
    }

    function initializeGames() {
      const gallery = document.getElementById('games-gallery');
      if (!gallery) return;

      bubbles = gamesData.map((game, idx) => new GameBubble(game, idx));
      
      // Animation loop
      function animate() {
        const gallery = document.getElementById('games-gallery');
        if (!gallery) return;
        
        const rect = gallery.getBoundingClientRect();
        const containerWidth = gallery.offsetWidth;
        const containerHeight = gallery.offsetHeight;

        bubbles.forEach(bubble => {
          bubble.update(containerWidth, containerHeight, mouseX - rect.left, mouseY - rect.top);
          bubble.render(gallery);
        });

        requestAnimationFrame(animate);
      }

      animate();
    }

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function openGameModal(game) {
      const modal = document.getElementById('gameModal');
      const title = document.getElementById('gameModalTitle');
      const desc = document.getElementById('gameModalDesc');
      const actions = document.getElementById('gameModalActions');
      
      if (!modal || !title || !desc || !actions) return;

      // Header avec icon
      title.innerHTML = `<img src="${game.icon}" alt="${game.title}"> ${game.title}`;
      desc.textContent = game.description;

      // Actions
      actions.innerHTML = '';
      
      if (game.type === 'webgl') {
        const launchBtn = document.createElement('button');
        launchBtn.className = 'game-action-button';
        launchBtn.innerHTML = '▶ Lancer le jeu';
        launchBtn.addEventListener('click', () => launchWebGL(game));
        actions.appendChild(launchBtn);
      } else if (game.type === 'addon') {
        const downloadBtn = document.createElement('a');
        downloadBtn.href = game.downloadPath;
        downloadBtn.download = '';
        downloadBtn.className = 'game-action-button';
        downloadBtn.innerHTML = '⬇ Télécharger (Addon)';
        downloadBtn.setAttribute('download', game.downloadPath.split('/').pop());
        actions.appendChild(downloadBtn);
      } else if (game.type === 'itch') {
        const itchBtn = document.createElement('a');
        itchBtn.href = game.itchioLink;
        itchBtn.target = '_blank';
        itchBtn.rel = 'noopener noreferrer';
        itchBtn.className = 'game-action-button';
        itchBtn.innerHTML = '🔗 Voir sur itch.io';
        actions.appendChild(itchBtn);
      }

      modal.classList.add('active');
    }

    function launchWebGL(game) {
      const loading = document.getElementById('gameLoading');
      const frame = document.getElementById('gameWebglFrame');
      const actions = document.getElementById('gameModalActions');
      
      if (loading) loading.classList.add('active');
      actions.style.display = 'none';

      setTimeout(() => {
        if (frame) {
          frame.src = game.webglPath;
          frame.classList.add('active');
        }
        if (loading) loading.classList.remove('active');
      }, 300);
    }

    function closeGameModal() {
      const modal = document.getElementById('gameModal');
      const frame = document.getElementById('gameWebglFrame');
      const loading = document.getElementById('gameLoading');
      const actions = document.getElementById('gameModalActions');
      
      if (modal) modal.classList.remove('active');
      if (frame) {
        frame.src = '';
        frame.classList.remove('active');
      }
      if (loading) loading.classList.remove('active');
      if (actions) actions.style.display = 'flex';
    }

    const closeBtn = document.getElementById('gameModalClose');
    if (closeBtn) {
      closeBtn.addEventListener('click', closeGameModal);
    }

    const modal = document.getElementById('gameModal');
    if (modal) {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeGameModal();
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeGameModal();
    });

    // Initialize on load
    window.addEventListener('load', initializeGames);
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeGames);
    } else {
      initializeGames();
    }
  </script>
</body>
</html>
