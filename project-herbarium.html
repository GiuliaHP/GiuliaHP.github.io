<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Herbarium — Projet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/icons/IC_Prophecy.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="project-cursor-icon" id="projectCursorIcon" aria-hidden="true">
    <img id="projectCursorIconImg" alt="" />
    <span id="projectCursorIconLabel"></span>
  </div>

  <div id="nav-placeholder"></div>

  <section class="project-trailer-banner" aria-label="Trailer The Herbarium" style="--project-banner-bg: url('assets/img/backgrounds/BG_Herbarium.png');">
    <div class="wrap">
      <div class="project-trailer-frame">
        <video class="project-trailer-video" muted loop playsinline preload="none" poster="assets/img/backgrounds/BG_Herbarium.png">
          <source src="assets/img/trailers/TR_Herbarium.mp4?v=20260320" type="video/mp4" />
        </video>
      </div>
    </div>
  </section>

  <section id="hero" class="project-page-hero">
    <div class="wrap">
      <div class="hero-left">
        <h1 class="hero-title">The <em>Herbarium</em></h1>
        <div class="hero-bottom">
          <p class="hero-desc">
            The Herbarium est un jeu cozy inspiré de Cooking Mama. Cueillez
            des ingrédients, préparez des potions et profitez de la vue !
          </p>
        </div>
      </div>
      <a href="https://aconitum-napellus.itch.io/the-herbarium-demo" target="_blank" rel="noopener noreferrer" class="project-icon-link" title="Jouer à The Herbarium">
        <img src="assets/img/icons/IC_Herbarium.png" alt="" class="project-icon" />
      </a>
    </div>
  </section>

  <section class="showcase-section">
    <div class="wrap">
      <div class="showcase-gallery-mount" data-manifest="assets/data/herbarium.json" data-tall-image-threshold="0.2"></div>
    </div>
  </section>

  <section class="wrap" style="padding: 3rem 0;">
    <a href="index.html#projects" class="project-back-link">← Retour aux projets</a>
  </section>

  <div id="footer-placeholder"></div>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/script.js"></script>

</html>
