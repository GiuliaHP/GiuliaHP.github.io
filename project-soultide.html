<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulTide — Projet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="assets/img/icons/IC_Main.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="project-cursor-icon" id="projectCursorIcon" aria-hidden="true">
    <img id="projectCursorIconImg" alt="" />
    <span id="projectCursorIconLabel"></span>
  </div>

  <div id="nav-placeholder"></div>

  <section class="project-trailer-banner" aria-label="Trailer SoulTide" style="--project-banner-bg: url('assets/img/backgrounds/BG_Soultide.png');">
    <div class="wrap">
      <div class="project-trailer-frame">
        <video class="project-trailer-video" muted loop playsinline preload="none" poster="assets/img/backgrounds/BG_Soultide.png">
          <source src="assets/img/trailers/TR_Soultide.mp4?v=20260320" type="video/mp4" />
        </video>
      </div>
    </div>
  </section>

  <section id="hero" class="project-page-hero">
    <div class="wrap">
      <div class="hero-left">
        <h1 class="hero-title"><em>SoulTide</em></h1>
        <div class="hero-bottom">
          <p class="hero-desc">
            SoulTide est un jeu de pêche reposant où l'on incarne le passeur d'âmes.
          </p>
        </div>
      </div>
      <div class="project-icon-link">
        <img src="assets/img/icons/IC_Soultide.png" alt="" class="project-icon" loading="lazy" />
      </div>
    </div>
  </section>

  <section class="showcase-section">
    <div class="wrap">
      <div class="showcase-gallery-mount" data-manifest="assets/data/soultide.json" data-tall-image-threshold="0.6"></div>
    </div>
  </section>

  <section class="team-contact-section" aria-label="Team contacts — SoulTide">
    <div class="wrap">
      <div class="contact-grid reveal">
        <div class="contact-intro">
          <div class="section-label">Team</div>
          <h2 class="contact-title">SoulTide is a <em>team</em> project!</h2>
          <p class="contact-copy">Find the contacts of people I collaborated with on this project.</p>
        </div>
        <div class="contact-links">
          <a href="https://www.artstation.com/paulinelaloue" class="contact-link" style="--contact-bg: url('../img/backgrounds/BG_Soultide_Pauline.jpg'); background-image: url('../img/backgrounds/BG_Soultide_Pauline.jpg')">
            <span class="contact-link-top">
              <img class="contact-logo" src="assets/img/logos/LO_Artstation.png" alt="" aria-hidden="true" />
              <span class="contact-link-label">Art Station</span>
            </span>
            <span class="contact-link-value">Pauline LALOUE</span>
          </a>
          <a href="https://archiveofourown.org/users/Tigroou" class="contact-link" style="--contact-bg: url('../img/backgrounds/BG_Soultide_Leslie.png'); background-image: url('../img/backgrounds/BG_Soultide_Leslie.png')">
            <span class="contact-link-top">
              <img class="contact-logo" src="assets/img/logos/LO_AO3.png" alt="" aria-hidden="true" />
              <span class="contact-link-label">Archive Of our Own</span>
            </span>
            <span class="contact-link-value">Leslie Ozanam</span>
          </a>
          <a href="https://selixy.dev/soultide" class="contact-link" style="--contact-bg: url('../img/backgrounds/BG_Soultide_Damien.png'); background-image: url('../img/backgrounds/BG_Soultide_Damien.png')">
            <span class="contact-link-top">
              <img class="contact-logo" src="assets/img/logos/LO_Damien.png" alt="" aria-hidden="true" />
              <span class="contact-link-label">Portfolio</span>
            </span>
            <span class="contact-link-value">Damien Boiloizeau</span>
          </a>
        </div>
      </div>
    </div>
  </section>

  <section class="wrap" style="padding: 3rem 0;">
    <a href="index.html#projects" class="project-back-link">← Retour aux projets</a>
  </section>

  <div id="footer-placeholder"></div>

  <script defer src="assets/js/components.js"></script>
  <script defer src="assets/js/script.js"></script>
</body>
</html>
